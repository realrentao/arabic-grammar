<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Audio Test</title></head>
<body style="background:#111;color:#eee;font-family:sans-serif;padding:40px;text-align:center">
<h2>🔊 Audio Playback Test</h2>
<p id="status">Loading...</p>
<button onclick="test1()" style="padding:12px 24px;margin:10px;font-size:16px">Test 1: New Audio()</button>
<button onclick="test2()" style="padding:12px 24px;margin:10px;font-size:16px">Test 2: Hidden Audio Element</button>
<button onclick="test3()" style="padding:12px 24px;margin:10px;font-size:16px">Test 3: Fetch + Blob</button>
<hr>
<p id="result" style="font-size:14px;color:#888"></p>
<script>
function log(msg){document.getElementById('status').textContent=msg;console.log(msg)}
function result(msg){document.getElementById('result').textContent=msg}

function test1(){
  log('Test 1: new Audio()');
  const path = 'audio/ar_f004344c4e01.mp3';
  try{
    const a = new Audio(path);
    a.oncanplaythrough = () => log('Can play through!');
    a.onerror = (e) => log('Error: '+e.message);
    a.play().then(()=>log('Playing!')).catch(e=>log('Play rejected: '+e.message));
    result('Test 1 started - check status');
  }catch(e){log('Exception: '+e.message)}
}

function test2(){
  log('Test 2: hidden audio element');
  const path = 'audio/ar_f004344c4e01.mp3';
  try{
    let a = document.getElementById('player');
    if(!a){
      a = document.createElement('audio');
      a.id = 'player';
      a.style.display = 'none';
      document.body.appendChild(a);
    }
    a.src = path;
    a.load();
    a.oncanplaythrough = () => log('Can play through!');
    a.onerror = (e) => log('Error');
    a.play().then(()=>log('Playing!')).catch(e=>log('Play rejected: '+e.message));
    result('Test 2 started');
  }catch(e){log('Exception: '+e.message)}
}

function test3(){
  log('Test 3: fetch + blob + Audio');
  const path = 'audio/ar_f004344c4e01.mp3';
  fetch(path)
    .then(r => {
      result('Fetched: '+r.status+' '+r.headers.get('content-type'));
      return r.blob();
    })
    .then(blob => {
      result('Blob: '+blob.type+' '+blob.size+' bytes');
      const url = URL.createObjectURL(blob);
      const a = new Audio(url);
      a.play().then(()=>log('Playing!')).catch(e=>log('Play rejected: '+e.message));
    })
    .catch(e => {log('Fetch failed: '+e.message);result('Fetch error: '+e.message)});
}
</script>
</body></html>
